on:
    push:
        branches:
          - main
    pull_request:
        branches:
            - main
            - dev
    workflow_call:
        inputs:
            test_pypi_version:
                description: "Version to install from TestPyPI. If empty, build and install from the source tree."
                type: string
                required: false
                default: ""

name: Install

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    install:
        runs-on: ${{ matrix.os }}
        name: ${{ matrix.os }} (${{ matrix.python-version}})

        strategy:
            fail-fast: false
            matrix:
                os: ["ubuntu-latest", "windows-latest", "macOS-latest"]
                python-version: ["3.8", "3.9", "3.10", "3.11"]

        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            # Source mode (push / PR): build and install the working tree.
            - name: Install from source
              if: ${{ inputs.test_pypi_version == '' }}
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                pip install .

            # Release-gate mode: install the published artifact from TestPyPI
            # (deps come from real PyPI, retry while the index propagates).
            - name: Install from TestPyPI
              if: ${{ inputs.test_pypi_version != '' }}
              shell: bash
              run: |
                python -m pip install --upgrade pip
                for i in $(seq 1 10); do
                  if pip install \
                      --index-url https://test.pypi.org/simple/ \
                      --extra-index-url https://pypi.org/simple/ \
                      "pyhdc==${{ inputs.test_pypi_version }}"; then
                    echo "Installed pyhdc==${{ inputs.test_pypi_version }} from TestPyPI"
                    exit 0
                  fi
                  echo "Attempt $i failed (TestPyPI may still be propagating); retrying in 15s..."
                  sleep 15
                done
                echo "Failed to install pyhdc==${{ inputs.test_pypi_version }} from TestPyPI after 10 attempts"
                exit 1

            # Import from a directory with no in-tree pyhdc/, so the installed
            # package is exercised and a module missing from the build fails here.
            - name: Test import (installed package, not the source tree)
              shell: bash
              run: |
                cd "$RUNNER_TEMP"
                python -c "import pyhdc; print('pyhdc import successful', pyhdc.__version__)"
