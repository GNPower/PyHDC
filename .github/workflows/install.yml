on:
    push:
        branches:
            - main
            - dev
    pull_request:
        branches:
            - main
            - dev

name: Installation
jobs:
    install:
        runs-on: ${{ matrix.os }}
        name: ${{ matrix.os }} (${{ matrix.python-version}})

        strategy:
            fail-fast: false
            matrix:
                os: ["ubuntu-latest", "windows-latest", "macOS-latest"]
                # os: ["windows-latest"]
                python-version: ["3.8", "3.9", "3.10", "3.11"]
                # python-version: ["3.11"]

        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install package
              run: pip install .
            - name: Test import
              run: python -c "import pyhdc; print('pyhdc import successful')"
