on:
    push:
        branches:
          - main
    pull_request:
        branches:
            - main
            - dev
    workflow_dispatch:
    workflow_call:
        inputs:
            test_pypi_version:
                description: "Version to install from TestPyPI and run the suite against. If empty, build and test the source tree."
                type: string
                required: false
                default: ""

name: Testing

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    test:
        runs-on: ${{ matrix.os }}
        name: ${{ matrix.os }} (${{ matrix.python-version}})

        strategy:
            fail-fast: false
            matrix:
                os: ["ubuntu-latest"]
                python-version: ["3.8", "3.9", "3.10", "3.11"]

        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            # Source mode (push / PR / dispatch): build and test the working tree.
            - name: Install dependencies (source)
              if: ${{ inputs.test_pypi_version == '' }}
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                pip install -r requirements_dev.txt
                pip install .
            - name: Test with Coverage (source)
              if: ${{ inputs.test_pypi_version == '' }}
              run: |
                pytest --cov=pyhdc --cov-report=xml --cov-report=term-missing
            - name: Upload coverage to Codecov
              if: ${{ inputs.test_pypi_version == '' }}
              uses: codecov/codecov-action@v4
              with:
                  file: ./coverage.xml
                  fail_ci_if_error: false
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

            # Release-gate mode: run the suite against the package installed from
            # TestPyPI. The source pyhdc/ is removed so the tests import the
            # installed package, which is what a real user would get.
            - name: Install test tooling and the TestPyPI package
              if: ${{ inputs.test_pypi_version != '' }}
              shell: bash
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements_dev.txt
                for i in $(seq 1 10); do
                  if pip install \
                      --index-url https://test.pypi.org/simple/ \
                      --extra-index-url https://pypi.org/simple/ \
                      "pyhdc==${{ inputs.test_pypi_version }}"; then
                    echo "Installed pyhdc==${{ inputs.test_pypi_version }} from TestPyPI"
                    break
                  fi
                  echo "Attempt $i failed (TestPyPI propagation); retrying in 15s..."
                  sleep 15
                done
                python -c "import pyhdc" || { echo "Could not install pyhdc from TestPyPI"; exit 1; }
            - name: Run the suite against the installed package
              if: ${{ inputs.test_pypi_version != '' }}
              shell: bash
              run: |
                rm -rf pyhdc
                python -c "import pyhdc; print('Testing installed package at', pyhdc.__file__, '->', pyhdc.__version__)"
                pytest

    benchmark:
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.test_pypi_version == '' }}
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                pip install -r requirements_dev.txt
                pip install .
            - name: Run benchmarks
              run: |
                pytest tests/benchmarks/ --benchmark-only --benchmark-json=benchmark_results.json
            - name: Store benchmark results
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-results
                  path: benchmark_results.json
